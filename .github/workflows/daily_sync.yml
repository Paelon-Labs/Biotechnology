name: Weekly Biotech Market Sync

on:
  schedule:
    # Runs every Friday at 22:00 UTC
    - cron: '0 22 * * 5'
  workflow_dispatch:
    # Allows you to run this manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape_and_process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright pandas
          python -m playwright install --with-deps firefox

      - name: Run Scraper and Refine Data
        working-directory: ./Daily Markets
        run: python scraper.py


      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"

          # 'git add -A' tracks additions, modifications, AND deletions
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync & Archive: Biotech Data $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi

      - name: Mirror to NASH-BIO/biotech-tickers
        env:
          NASH_BIO_TOKEN: ${{ secrets.NASH_BIO_TOKEN }}
        run: |
          # actions/checkout injects a GITHUB_TOKEN auth header into local git config
          # that overrides URL credentials. Strip it so the mirror URL's token is used.
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote add mirror "https://x-access-token:${NASH_BIO_TOKEN}@github.com/NASH-BIO/biotech-tickers.git"
          git push --force mirror HEAD:main
