name: Daily Biotech Market Sync

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    # Allows you to run this manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape_and_process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright pandas
          python -m playwright install --with-deps firefox

      - name: Run Scraper and Refine Data
        # We use 'working-directory' to tell GitHub where scraper.py lives
        working-directory: ./Daily Markets
        run: python scraper.py


      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          
          # 'git add -A' tracks additions, modifications, AND deletions
          git add -A
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync & Archive: Biotech Data $(date +'%Y-%m-%d')"
            git push
          fi